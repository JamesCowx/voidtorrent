<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9a6fe6"/>
      <stop offset="1" stop-color="#5b2ea8"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.6">
      <stop offset="0" stop-color="#7c4dd6" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#7c4dd6" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- ambient glow -->
  <circle cx="256" cy="244" r="150" fill="url(#glow)" filter="url(#soft)"/>

  <!-- outer ring -->
  <circle cx="256" cy="256" r="150" stroke="url(#ring)" stroke-width="13" fill="none" stroke-linecap="round"
          stroke-dasharray="930 30" transform="rotate(-90 256 256)"/>

  <!-- spiral into the void -->
  <path id="spiral" stroke="url(#ring)" stroke-width="13" fill="none" stroke-linecap="butt"
        d="M 406 256
           C 406 175, 337 106, 256 106
           C 175 106, 106 175, 106 256
           C 106 337, 175 406, 256 406
           C 329 406, 384 350, 384 283
           C 384 224, 340 184, 288 184
           C 240 184, 206 220, 206 262
           C 206 300, 236 327, 270 327
           C 300 327, 320 307, 320 284
           C 320 266, 304 256, 288 256
           C 272 256, 262 268, 262 280
           C 262 290, 270 296, 278 296
           C 285 296, 290 291, 290 286"/>
</svg>
